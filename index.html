<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ff8fcf" />
  <meta name="description" content="カラフルでポップなバーチャルペット育成アプリ Eggchi" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Eggchi" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
  <title>Eggchi Pocket Pet</title>
  <style>
    :root{--bg1:#fff6b8;--bg2:#ffb9d6;--ink:#5d3b75;--panel:rgba(255,255,255,.8);--panel-strong:rgba(255,255,255,.9);--chip-bg:rgba(255,255,255,.82);--meter-bg:rgba(255,255,255,.68);--shadow:0 12px 28px rgba(122,44,107,.18)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;min-height:-webkit-fill-available;overflow:hidden}
    body{min-height:100vh;min-height:100dvh;min-height:-webkit-fill-available;font-family:"Trebuchet MS","Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;color:var(--ink);background:radial-gradient(circle at top left,rgba(255,255,255,.8) 0 12%,transparent 13%),radial-gradient(circle at 80% 14%,rgba(255,255,255,.5) 0 10%,transparent 11%),linear-gradient(180deg,var(--bg1),var(--bg2));overflow:hidden;transition:background .55s ease,color .4s ease}
    .app{width:min(100%,430px);height:100vh;height:100dvh;max-height:-webkit-fill-available;min-height:-webkit-fill-available;margin:0 auto;padding:max(8px,env(safe-area-inset-top)) 12px max(10px,env(safe-area-inset-bottom));display:grid;grid-template-rows:auto auto minmax(0,1fr) auto auto;gap:8px;overflow:hidden}
    .hud,.message,.selector,.controls{background:var(--panel);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.45);box-shadow:var(--shadow);border-radius:20px}
    .hud{padding:10px 12px}.hud-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}.title{margin:0;font-size:1.2rem;color:var(--ink);text-shadow:0 1px 0 rgba(255,255,255,.15)}.top-actions{display:flex;align-items:center;gap:8px}.stage{display:inline-flex;align-items:center;justify-content:center;min-height:30px;padding:6px 10px;border-radius:999px;background:var(--chip-bg);font-size:.76rem;font-weight:800;text-align:center;color:var(--ink)}
    .mini-icon{border:none;border-radius:999px;background:var(--chip-bg);color:var(--ink);padding:7px 10px;font:inherit;font-size:.74rem;font-weight:800;box-shadow:0 8px 16px rgba(94,48,105,.12)}
    .bars{display:grid;gap:8px}.bar-row{display:grid;grid-template-columns:72px 1fr 34px;gap:8px;align-items:center;font-size:.9rem;color:var(--ink)}.bar-row strong{color:var(--ink)}.meter{height:12px;background:var(--meter-bg);border-radius:999px;overflow:hidden}.meter-fill{height:100%;border-radius:inherit;transition:width .24s ease;background:linear-gradient(90deg,#ff9dc2,#ffc768)}.meter-fill.fun{background:linear-gradient(90deg,#7de3a1,#58d4ff)}.meter-fill.energy{background:linear-gradient(90deg,#8b8cff,#cf8aff)}
    .message{padding:10px 12px;min-height:62px;display:grid;align-content:center;gap:4px;background:var(--panel-strong)}.message strong{font-size:.94rem;line-height:1.32;color:var(--ink)}.tiny{font-size:.72rem;opacity:.86;line-height:1.32;color:var(--ink)}
    .pet-zone{position:relative;display:grid;place-items:center;min-height:clamp(145px,26dvh,220px);padding:10px;border-radius:26px;background:radial-gradient(circle at 50% 25%,rgba(255,255,255,.86),rgba(255,255,255,.34) 40%,transparent 64%),linear-gradient(180deg,rgba(255,255,255,.28),rgba(255,255,255,.12));box-shadow:inset 0 1px 0 rgba(255,255,255,.68);overflow:hidden}
    .sparkles,.room-items,.effects-layer,.mini-game{position:absolute;inset:0}.sparkles span,.room-items span{position:absolute;display:block}.sparkles span{width:10px;height:10px;border-radius:2px;background:rgba(255,255,255,.92);animation:twinkle 2.6s infinite ease-in-out}.sparkles span:nth-child(1){top:16%;left:16%}.sparkles span:nth-child(2){top:24%;right:18%;animation-delay:.7s}.sparkles span:nth-child(3){top:58%;left:10%;animation-delay:1.5s}.sparkles span:nth-child(4){top:70%;right:16%;animation-delay:.4s}
    .mess{width:22px;height:18px;border-radius:50% 50% 40% 40%;background:#9a6a50;box-shadow:inset 0 -4px 0 rgba(0,0,0,.08)}.mess::after{content:"";position:absolute;width:10px;height:10px;top:-5px;left:6px;border-radius:50%;background:#9a6a50}.leftover{width:34px;height:18px;border-radius:11px 11px 14px 14px;background:linear-gradient(180deg,#fffef8 0 46%,#f7f1de 47% 68%,#ffcf77 69% 100%);box-shadow:0 4px 0 rgba(255,255,255,.35),inset 0 -3px 0 rgba(164,108,54,.18),0 8px 12px rgba(93,59,117,.1)}.leftover::before{content:"";position:absolute;left:-2px;right:-2px;bottom:-4px;height:8px;border-radius:999px;background:linear-gradient(180deg,#fff,#ffdce8);box-shadow:0 1px 0 rgba(0,0,0,.08)}.leftover::after{content:"";position:absolute;left:8px;top:3px;width:18px;height:7px;border-radius:999px;background:radial-gradient(circle at 3px 3px,#fff 0 2px,transparent 2.5px),radial-gradient(circle at 9px 2px,#fff 0 2px,transparent 2.5px),radial-gradient(circle at 15px 4px,#fff 0 2px,transparent 2.5px),linear-gradient(90deg,#ff8a72 0 5px,#ffd969 5px 10px,#7de3a1 10px 18px)}
    .effect-burst{position:absolute;left:50%;top:55%;font-size:1.35rem;opacity:0;transform:translate(-50%,-50%);animation:burstUp .9s ease-out forwards;filter:drop-shadow(0 6px 10px rgba(93,59,117,.18))}
    .pet-shadow{position:absolute;bottom:8%;width:40%;height:8%;background:rgba(123,69,136,.14);border-radius:50%;filter:blur(2px);animation:shadowPulse 2.8s infinite ease-in-out}.pet-wrap{position:relative;width:min(48vw,178px);aspect-ratio:1/1;animation:petFloat 2.8s infinite ease-in-out;filter:drop-shadow(0 10px 0 rgba(255,255,255,.26)) drop-shadow(0 16px 24px rgba(109,61,127,.18));z-index:1}.pet-wrap.is-hyped{animation-duration:1.7s}.pet-wrap.is-sleeping{animation-duration:4.4s}.pet-wrap.is-sick{animation-duration:3.6s;filter:drop-shadow(0 6px 0 rgba(255,255,255,.2)) drop-shadow(0 10px 18px rgba(109,61,127,.12))}.pet-wrap.is-evolving{animation:evolvePulse .62s infinite steps(2,end)}.pet-wrap.is-jumping{animation:petHop .55s 3 ease-in-out}.pet-wrap.is-departing{animation:petExit 4.4s forwards ease-in-out}.pet-wrap.is-memorial{animation:none;filter:drop-shadow(0 10px 22px rgba(78,52,102,.22))}svg{width:100%;height:100%;image-rendering:pixelated;shape-rendering:crispEdges}
    .pet-zone.is-special-ready{box-shadow:inset 0 1px 0 rgba(255,255,255,.78),0 0 0 3px rgba(255,255,255,.55),0 0 28px rgba(255,232,115,.75);animation:specialReady .65s infinite steps(2,end)}
    .evolve-btn,.restart-btn{position:absolute;display:none;align-items:center;justify-content:center;padding:10px 14px;border:none;border-radius:999px;color:var(--ink);font:inherit;font-weight:900;box-shadow:0 12px 24px rgba(94,48,105,.18);z-index:4}
    .evolve-btn{right:12px;bottom:12px;background:linear-gradient(180deg,#fff38f,#ff86c5)}
    .restart-btn{left:50%;bottom:12px;transform:translateX(-50%);background:linear-gradient(180deg,#fffef8,#9de2ff);max-width:calc(100% - 28px);text-align:center}
    .evolve-btn.visible,.restart-btn.visible{display:inline-flex}
    .mini-game{display:grid;place-items:center;padding:12px;background:rgba(255,255,255,.16);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .18s ease;z-index:3}.mini-game.active{opacity:1;pointer-events:auto}.mini-game-card{width:min(100%,300px);border-radius:24px;padding:12px;background:rgba(255,255,255,.9);box-shadow:0 18px 36px rgba(94,48,105,.18);display:grid;gap:8px;touch-action:manipulation}.mini-game-head,.mini-game-foot{display:flex;align-items:center;justify-content:space-between;gap:10px}.mini-game-arena{position:relative;height:148px;border-radius:20px;overflow:hidden;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.9),rgba(255,255,255,.18) 40%,transparent 45%),linear-gradient(180deg,#8fd9ff,#ffd0ec);border:2px solid rgba(255,255,255,.68)}.countdown{position:absolute;inset:0;display:grid;place-items:center;font-size:2rem;font-weight:900;color:#fff;text-shadow:0 6px 14px rgba(93,59,117,.28);opacity:0;pointer-events:none;z-index:5}.countdown.show{opacity:1}.mini-judge{position:absolute;left:50%;top:18%;transform:translate(-50%,-50%) scale(.9);padding:7px 10px;border-radius:999px;background:rgba(79,55,104,.86);color:#fff;font-size:.8rem;font-weight:900;letter-spacing:.08em;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;white-space:nowrap;opacity:0;transition:opacity .12s ease,transform .12s ease;pointer-events:none;z-index:4}.mini-judge.show{opacity:1;transform:translate(-50%,-50%) scale(1)}.mini-judge.great{background:linear-gradient(180deg,#ff8bc7,#ff5ea2)}.mini-judge.good{background:linear-gradient(180deg,#73d7ff,#5c9fff)}.mini-judge.ok{background:linear-gradient(180deg,#ffd46f,#ffae54)}.mini-judge.bad{background:linear-gradient(180deg,#8e8aa3,#676177)}.center-zone{position:absolute;left:48%;top:50%;width:4%;height:18px;transform:translateY(-50%);border:2px solid rgba(255,255,255,.96);border-radius:999px;opacity:0;background:rgba(255,255,255,.18);box-shadow:0 0 0 3px rgba(255,255,255,.14)}.center-zone.show{opacity:1}.runner,.hazard{position:absolute;display:none}.runner{left:50%;top:50%;transform:translate(-50%,-50%);width:22px;height:12px;border-radius:999px;background:linear-gradient(180deg,#fff38f,#ff86c5);box-shadow:0 8px 16px rgba(93,59,117,.2)}.runner.locked{box-shadow:0 0 0 4px rgba(255,255,255,.28),0 8px 16px rgba(93,59,117,.24)}.hazard{top:-18px;width:22px;height:22px;border-radius:6px;background:linear-gradient(180deg,#63606f,#2d2b33)}
    .target{position:absolute;width:52px;height:52px;border:none;border-radius:50%;display:grid;place-items:center;font-size:1.3rem;color:#fff;background:linear-gradient(180deg,#ffb74f,#ff7a67);box-shadow:0 10px 18px rgba(93,59,117,.2),inset 0 -6px 0 rgba(0,0,0,.08);transform:translate(-50%,-50%);transition:left .22s ease,top .22s ease,transform .12s ease,opacity .16s ease,box-shadow .14s ease,filter .14s ease;width:52px;animation:targetBob 1.25s infinite ease-in-out}.target:nth-child(2n){background:linear-gradient(180deg,#73d7ff,#5c9fff);animation-duration:1.5s}.target:nth-child(3n){background:linear-gradient(180deg,#98efb5,#53ca88);animation-duration:1.05s}.target.hidden{opacity:0;pointer-events:none}.target.flash{transform:translate(-50%,-50%) scale(1.12)!important;filter:brightness(1.18);box-shadow:0 0 0 6px rgba(255,255,255,.28),0 10px 18px rgba(93,59,117,.24)}
    .selector{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px}.action-chip{flex:1;min-height:40px;display:flex;align-items:center;justify-content:center;gap:8px;border-radius:999px;background:var(--chip-bg);font-weight:800;text-align:center;padding:0 12px;color:var(--ink)}
    .controls{padding:10px 10px 6px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.btn-wrap{display:grid;justify-items:center;gap:5px}.control-button{width:clamp(54px,15vw,68px);height:clamp(54px,15vw,68px);border:none;border-radius:50%;color:#fff;font-size:1.2rem;font-weight:800;box-shadow:0 10px 24px rgba(94,48,105,.22),inset 0 -6px 0 rgba(0,0,0,.08)}.control-button:active{transform:translateY(2px) scale(.98)}.left-btn{background:linear-gradient(180deg,#7bbdff,#5098ff)}.center-btn{background:linear-gradient(180deg,#ff9dc2,#ff6ba8)}.right-btn{background:linear-gradient(180deg,#8fe6af,#52cc86)}.btn-label{font-size:.76rem;font-weight:800;color:var(--ink)}
    .dex-overlay{position:fixed;inset:0;display:grid;place-items:center;padding:10px;background:rgba(255,244,251,.62);backdrop-filter:blur(14px);opacity:0;pointer-events:none;transition:opacity .18s ease;z-index:20}.dex-overlay.open{opacity:1;pointer-events:auto}.dex-panel{width:min(100%,430px);max-height:92dvh;max-height:-webkit-fill-available;background:rgba(255,255,255,.94);border:1px solid rgba(255,255,255,.55);box-shadow:var(--shadow);border-radius:24px;padding:14px;display:grid;grid-template-rows:auto minmax(0,1fr);gap:10px;overflow:hidden}.dex-head{display:flex;align-items:center;justify-content:space-between;gap:10px}.dex-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;overflow-y:auto;overflow-x:hidden;padding-right:2px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;touch-action:pan-y}.dex-card{background:rgba(255,255,255,.82);border-radius:18px;padding:10px;display:grid;gap:8px;box-shadow:0 8px 18px rgba(94,48,105,.1)}.dex-card.locked{opacity:.78}.dex-thumb{aspect-ratio:1/1;border-radius:16px;display:grid;place-items:center;background:linear-gradient(180deg,rgba(255,255,255,.7),rgba(255,255,255,.38))}.dex-thumb svg{width:88%;height:88%}.dex-name{font-size:.8rem;font-weight:900}.dex-note{font-size:.68rem;opacity:.75}
    @keyframes petFloat{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-10px) rotate(-2deg)}}@keyframes petHop{0%,100%{transform:translateY(0) scale(1)}45%{transform:translateY(-16px) scale(1.04)}70%{transform:translateY(-4px) scale(.98)}}@keyframes petExit{0%{transform:translateX(0) translateY(0) scale(1);opacity:1}30%{transform:translateX(12px) translateY(-6px) scale(1.03);opacity:1}100%{transform:translateX(180px) translateY(-34px) scale(.86);opacity:0}}@keyframes shadowPulse{0%,100%{transform:scaleX(1);opacity:.22}50%{transform:scaleX(.88);opacity:.12}}@keyframes twinkle{0%,100%{transform:scale(.6) rotate(0);opacity:.2}50%{transform:scale(1) rotate(45deg);opacity:.95}}@keyframes burstUp{0%{opacity:0;transform:translate(-50%,-10%) scale(.7)}20%{opacity:1}100%{opacity:0;transform:translate(calc(-50% + var(--drift-x,0px)),calc(-130% + var(--drift-y,-40px))) scale(1.2)}}@keyframes targetBob{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,calc(-50% - 4px)) scale(1.04)}}@keyframes evolvePulse{0%,100%{transform:translateY(0) scale(1);filter:brightness(1) drop-shadow(0 0 0 rgba(255,255,255,0))}50%{transform:translateY(-4px) scale(1.08);filter:brightness(1.35) drop-shadow(0 0 18px rgba(255,255,255,.92)) drop-shadow(0 0 34px rgba(255,214,113,.95))}}@keyframes specialReady{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.01);filter:brightness(1.22)}}.sleep-bubble{animation:bubble 1.8s infinite ease-in-out;transform-origin:center}@keyframes bubble{0%,100%{transform:translateY(0);opacity:.35}50%{transform:translateY(-6px);opacity:1}}
    @media (max-height:760px){.app{padding-left:10px;padding-right:10px;gap:7px}.pet-zone{min-height:clamp(138px,24dvh,190px);padding:8px}.mini-game-arena{height:124px}.target{width:42px;height:42px}.message{min-height:58px}.controls{padding-top:8px}.dex-panel{padding:12px}}
  </style>
</head>
<body>
  <main class="app">
    <section class="hud">
      <div class="hud-top"><h1 class="title">Eggchi</h1><div class="top-actions"><button class="mini-icon" id="debugHourButton" type="button">+1h</button><button class="mini-icon" id="dexButton" type="button">ずかん</button><div class="stage" id="stageTag">たまごベビー</div></div></div>
      <div class="bars">
        <div class="bar-row"><span>おなか</span><div class="meter"><div class="meter-fill" id="hungerBar"></div></div><strong id="hungerValue">80</strong></div>
        <div class="bar-row"><span>なかよし</span><div class="meter"><div class="meter-fill fun" id="happinessBar"></div></div><strong id="happinessValue">80</strong></div>
        <div class="bar-row"><span>たいりょく</span><div class="meter"><div class="meter-fill energy" id="energyBar"></div></div><strong id="energyValue">80</strong></div>
      </div>
    </section>
    <section class="message"><strong id="statusLine">ふわふわ生まれたて。おせわしてね。</strong><span id="subLine" class="tiny">左右で行動を選んで、まんなかで決定。</span></section>
    <section class="pet-zone" id="petZone">
      <div class="sparkles"><span></span><span></span><span></span><span></span></div>
      <div class="room-items" id="messLayer"></div>
      <div class="effects-layer" id="effectsLayer"></div>
      <div class="mini-game" id="miniGame">
        <div class="mini-game-card">
          <div class="mini-game-head"><strong id="miniGameMode">ほしキャッチ</strong><span class="stage" id="miniGameTimer">6.0秒</span></div>
          <span class="tiny" id="miniGameText">飛びまわるスターをタップして、なかよし度アップ。</span>
          <div class="mini-game-arena"><div class="countdown" id="miniGameCountdown">3</div><div class="mini-judge" id="miniGameJudge">すごい！</div><div class="center-zone" id="centerZone"></div><div class="runner" id="runner"></div><div class="hazard" id="hazardA"></div><div class="hazard" id="hazardB"></div><button class="target" id="targetA" type="button">★</button><button class="target" id="targetB" type="button">✦</button><button class="target" id="targetC" type="button">✿</button></div>
          <div class="mini-game-foot"><span class="tiny" id="miniGameMeta">6秒チャレンジ</span><strong>スコア <span id="miniGameScore">0</span></strong></div>
        </div>
      </div>
      <div class="pet-shadow"></div>
      <div class="pet-wrap" id="petWrap"></div>
      <button class="restart-btn" id="restartButton" type="button">つぎの世代をそだてる</button>
      <button class="evolve-btn" id="evolveButton" type="button">しんか！</button>
    </section>
    <section class="selector"><span class="tiny">いまのこうどう</span><div class="action-chip"><span id="actionEmoji">🍙</span><span id="actionName">ごはん</span></div><span class="tiny" id="ageLabel">0秒</span></section>
    <section class="controls">
      <div class="btn-wrap"><button class="control-button left-btn" id="prevButton" aria-label="前のアクション">◀</button><span class="btn-label">えらぶ</span></div>
      <div class="btn-wrap"><button class="control-button center-btn" id="actionButton" aria-label="アクション実行">●</button><span class="btn-label">けってい</span></div>
      <div class="btn-wrap"><button class="control-button right-btn" id="nextButton" aria-label="次のアクション">▶</button><span class="btn-label">つぎへ</span></div>
    </section>
  </main>
  <div class="dex-overlay" id="dexOverlay">
    <div class="dex-panel">
      <div class="dex-head"><strong>Eggchi ずかん</strong><button class="mini-icon" id="dexClose" type="button">× 閉じる</button></div>
      <div class="dex-grid" id="dexGrid"></div>
    </div>
  </div>
  <script>
    const STORAGE_KEY='eggchi-pocket-save-v1',TICK_MS=1000,SLEEP_MS=28800000,ZERO_GRACE_MS=1800000,POOP_SICK_MS=10800000,LEFTOVER_GRUMPY_MS=3600000,GRUMPY_WAKE_WINDOW_MS=300000,GRUMPY_WAKE_LIMIT=3,GRUMPY_DURATION_MS=1800000,MARRIAGE_MS=3600000,DEPARTURE_MS=4800,MINIGAME_DURATION_MS=6000,MINIGAME_TICK_MS=100,MINIGAME_MOVE_MS=650,HAPPY_REACTION_MS=2400,RHYTHM_CENTER=50;
    const ACTIONS=[{id:'feed',label:'ごはん',emoji:'🍙'},{id:'play',label:'あそぶ',emoji:'🎈'},{id:'clean',label:'そうじ',emoji:'🫧'},{id:'heal',label:'ちりょう',emoji:'💊'},{id:'sleep',label:'ねかせる',emoji:'💤'}];
